
#type: args
# SMOKE-TEST config (CSDI benchmark): identical to base.yaml EXCEPT epochs=2.
# Used only to validate the end-to-end train->sample->CRPS pipeline and check for
# NaNs / decreasing loss before committing to the full 200-epoch reproduction.
# The paper reproduction itself uses the untouched base.yaml (epochs=200).

train:
  epochs: 2
  batch_size: 16
  lr: 1.0e-3
  itr_per_epoch: 1.0e+8


diffusion:
  layers: 4
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.5
  num_steps: 50
  schedule: "quad"
  is_linear: False

model:
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  target_strategy: "random"
